<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>내맘대로 랜덤 뽑기 | 문정민</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>문정민</h1>
  <p class="subtitle">사람의 온기를 전하는 예비 스포츠 캐스터</p>
</header>
<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="contact.html">Contact</a>
</nav>
<main class="container">
  <section class="intro-card">
    <h2>String + Array + Math 조합: 랜덤 뽑기</h2>
    
    <script>
      let defaultList = "제육볶음,돈까스,순대국,김치찌개,햄버거,초밥,파스타,샐러드,떡볶이,마라탕";
      let inputString = prompt("항목을 콤마(,)로 구분하여 입력하세요", defaultList);

      if (!inputString) {
        document.write("<p>뽑기를 취소했습니다.</p>");
      } else {
        // 문자열을 배열로 변환
        let items = inputString.split(','); 

        // 랜덤 인덱스 뽑기
        let index = Math.floor(Math.random() * items.length); 
        let choice = items[index].trim();

        // 기존 템플릿의 info-box 디자인을 활용해 결과 출력
        document.write("<div class='info-box' style='margin-top: 20px; text-align: center;'>");
        document.write("<p>입력한 항목 (총 " + items.length + "개)</p>");
        document.write("<p style='color: #666; font-size: 0.9em;'>" + inputString + "</p>");
        
        document.write("<hr style='margin: 15px 0; border: 0; border-top: 1px dashed #ccc;'>");
        document.write("<h3 style='color: #008275;'>당신의 선택은...</h3>");
        document.write("<h1 style='color: #CF4500; font-size: 2.5rem; margin: 15px 0;'>🎉 " + choice + " 🎉</h1>");
        document.write("<p style='font-size: 0.9em; color: gray;'><i>새로고침(F5)을 눌러 다시 뽑을 수 있습니다.</i></p>");
        document.write("</div>");
      }
    </script>
  </section>
</main>
<footer>
  <small>&copy; <span id="year"></span> jungmin_moon. All rights reserved.</small>
</footer>
<script src="script.js"></script>
</body>
</html>
