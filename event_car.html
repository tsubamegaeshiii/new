<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>실습 6: 키보드 자동차 | 문정민</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #playground {
        position: relative;
        width: 100%; height: 500px;
        background-color: #e0f2f1;
        border: 2px solid #b2dfdb; border-radius: 20px;
        margin-top: 24px; overflow: hidden; 
        box-shadow: inset 0 4px 12px rgba(0,0,0,0.05);
    }
    #car {
        position: absolute; left: 50px; top: 50px;        
        width: 100px; height: 60px;
        transition: transform 0.15s ease-out; 
        transform-origin: center center; z-index: 10;
    }
    .car-top {
        position: absolute; top: 0; left: 20px; width: 50px; height: 25px;
        background-color: #00695c; border-radius: 20px 20px 0 0;
    }
    .car-window {
        position: absolute; top: 4px; left: 24px; width: 25px; height: 21px;
        background-color: #e0f2f1; border-radius: 16px 8px 0 0;
    }
    .car-body {
        position: absolute; top: 25px; left: 0; width: 100px; height: 25px;
        background-color: #008275; border-radius: 10px 20px 5px 5px; 
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .wheel {
        position: absolute; bottom: 0; width: 22px; height: 22px;
        background-color: #333333; border-radius: 50%; 
        border: 3px solid #D1CDC7; box-sizing: border-box;
    }
    .wheel-left { left: 15px; }
    .wheel-right { right: 15px; }
    
    #info-box {
        margin-top: 16px; padding: 16px; background-color: #ffffff;
        border-radius: 12px; display: inline-block; font-weight: bold;
        color: #008275; border: 1px solid #d1cdc7;
    }
  </style>
  <script>
    var x = 50, y = 50, step = 20; 
    var currentAngle = "rotate(0deg)"; 

    window.onload = function() {
        var car = document.getElementById("car");
        var info = document.getElementById("info-coord");
        var playground = document.getElementById("playground");

        document.onkeydown = function(e) {
            if([37, 38, 39, 40].indexOf(e.keyCode) > -1) e.preventDefault(); 

            var maxX = playground.clientWidth - car.offsetWidth;
            var maxY = playground.clientHeight - car.offsetHeight;

            switch(e.keyCode) {
                case 37: x -= step; currentAngle = "scaleX(-1)"; break;
                case 38: y -= step; currentAngle = "rotate(-90deg)"; break;
                case 39: x += step; currentAngle = "rotate(0deg)"; break;
                case 40: y += step; currentAngle = "rotate(90deg)"; break;
            }

            if (x < 0) x = 0;             
            if (y < 0) y = 0;             
            if (x > maxX) x = maxX;       
            if (y > maxY) y = maxY;       

            car.style.left = x + "px";
            car.style.top = y + "px";
            car.style.transform = currentAngle; 
            info.innerHTML = x + ", " + y;
        }
    }
  </script>
</head>
<body>
  <div class="floating-nav-container" style="position: sticky; top: 24px; z-index: 100; display: flex; justify-content: center; padding: 0 1rem;">
    <nav style="background-color: white; border-radius: 999px; padding: 14px 40px; box-shadow: 0px 4px 24px rgba(0,0,0,0.04); display: flex; gap: 48px; align-items: center;">
      <div style="font-weight: 700;">JM.MOON</div>
      <a href="index.html" style="color: #141413; text-decoration: none; font-weight: 500;">Home</a>
      <a href="portfolio.html" style="color: #141413; text-decoration: none; font-weight: 500;">Portfolio</a>
    </nav>
  </div>

  <main style="max-width: 900px; margin: 80px auto 40px; padding: 0 24px;">
    <h2 style="font-size: 32px; margin-bottom: 8px;">키보드 자동차 제어</h2>
    <p style="color: #696969; margin-bottom: 8px;">키보드 방향키(←, ↑, →, ↓)를 눌러 민트색 트랙 안에서 자동차를 운전해보세요.</p>
    <p style="color: #d32f2f; font-size: 14px;">※ 순수 CSS로 조립된 자동차가 화면 경계를 벗어나지 않고 부드럽게 이동합니다.</p>

    <div id="info-box">📍 현재 좌표 (X, Y) : <span id="info-coord" style="color: #F37338;">50, 50</span></div>

    <div id="playground">
        <div id="car">
            <div class="car-top"></div>
            <div class="car-window"></div>
            <div class="car-body"></div>
            <div class="wheel wheel-left"></div>
            <div class="wheel wheel-right"></div>
        </div>
    </div>
  </main>
</body>
</html>
