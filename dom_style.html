<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실습 1: 스타일 변환기</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #target {
        font-size: 20px; font-weight: bold; padding: 24px;
        border: 1.5px solid #D1CDC7; margin: 20px auto; width: 100%; max-width: 600px;
        transition: all 0.3s ease; text-align: center; border-radius: 24px; background-color: #ffffff;
    }
    .dom-btn {
        padding: 12px 20px; font-size: 15px; margin: 6px; cursor: pointer; 
        background-color: #f1f8f7; border: 1px solid #b2dfdb; border-radius: 16px; 
        font-family: inherit; color: #00695c; font-weight: 700; transition: all 0.2s;
    }
    .dom-btn:hover { background-color: #e0f2f1; transform: translateY(-2px); }
  </style>
  <script>
    function changeColor() {
        var obj = document.getElementById("target"); 
        obj.style.color = (obj.style.color === "") ? "#00695c" : ""; 
    }
    function changeSize() {
        var obj = document.getElementById("target"); 
        obj.style.fontSize = (obj.style.fontSize === "") ? "32px" : "";
    }
    function changeBackground() {
        var obj = document.getElementById("target"); 
        obj.style.backgroundColor = (obj.style.backgroundColor === "") ? "#e0f2f1" : "";
    }
    function toggleVisibility() {
        var obj = document.getElementById("target"); 
        obj.style.display = (obj.style.display === "none") ? "block" : "none";
    }
  </script>
</head>
<body>
  <div class="floating-nav-container">
    <nav class="floating-nav">
      <div style="font-weight: 700;">JM.MOON</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </div>

  <main class="container" style="margin-top: 80px;">
    <section class="stadium-card" style="text-align: center; padding: 48px;">
      <span class="eyebrow" style="justify-content: center;">Practice 1</span>
      <h3 style="margin-bottom: 16px;">DOM 스타일 변환기</h3>
      <p style="color: var(--slate-gray); margin-bottom: 24px;">아래 버튼들을 클릭해 문장의 스타일을 제어해 보세요.</p>
      
      <p id="target">방가방가 햄토리~</p>
      
      <div style="margin-top: 24px;">
        <button class="dom-btn" onclick="changeColor()">글자색 변경</button> 
        <button class="dom-btn" onclick="changeSize()">크게 보기</button> 
        <button class="dom-btn" onclick="changeBackground()">배경 강조</button>
        <button class="dom-btn" onclick="toggleVisibility()">숨기기/보이기</button>
      </div>
    </section>
  </main>
</body>
</html>
